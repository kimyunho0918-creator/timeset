<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>학급 통합 관리 시스템</title>
    <style>
        :root { --primary: #4a90e2; --bg: #f0f2f5; }
        body { font-family: 'Pretendard', sans-serif; margin: 0; display: flex; height: 100vh; background: var(--bg); overflow: hidden; }
        .main-content { flex: 1; padding: 30px; display: flex; flex-direction: column; gap: 20px; overflow-y: auto; }
        .section { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .auth-box { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .notice-list { list-style: none; padding: 0; }
        .notice-item { padding: 10px; border-bottom: 1px solid #eee; color: #444; font-size: 0.95em; }
        .admin-controls { margin-top: 15px; display: none; padding-top: 15px; border-top: 1px dashed #eee; }
        input { padding: 8px; border: 1px solid #ddd; border-radius: 5px; }
        button { padding: 8px 12px; background: var(--primary); color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 0.9em; }
        .sidebar { width: 250px; background: white; border-left: 1px solid #ddd; display: flex; flex-direction: column; }
        .sidebar-header { padding: 20px; background: var(--primary); color: white; font-weight: bold; text-align: center; }
        .student-list { flex: 1; overflow-y: auto; padding: 10px; }
        .student-item {
            display: block; padding: 12px; margin-bottom: 8px; background: #fff;
            border: 1px solid #eee; border-radius: 8px; text-decoration: none; color: #333;
            text-align: center; transition: 0.2s; font-size: 0.9em; font-weight: 600;
        }
        .student-item:hover { background: var(--primary); color: white; transform: translateX(-5px); }
    </style>
</head>
<body>
    <div class="main-content">
        <div class="section">
            <div class="auth-box">
                <h2>📢 학급 공지</h2>
                <div id="login-zone">
                    <input type="password" id="adminPw" placeholder="비번(1234)" style="width:80px">
                    <button onclick="login()">로그인</button>
                </div>
                <div id="logout-zone" style="display:none;"><button onclick="logout()" style="background:#ff4757">로그아웃</button></div>
            </div>
            <ul class="notice-list" id="noticeList"></ul>
            <div class="admin-controls" id="adminControls">
                <input type="text" id="noticeInput" placeholder="공지 입력" style="width:60%">
                <button onclick="addNotice()">등록</button>
                <button onclick="clearNotices()" style="background:#666">삭제</button>
            </div>
        </div>
    </div>
    <div class="sidebar">
        <div class="sidebar-header">학생 선택</div>
        <div class="student-list">
            <script>
                for(let i=1; i<=31; i++) {
                    document.write(`<a href="test-${i}.html" class="student-item">${i}번 학생 시간표</a>`);
                }
            </script>
        </div>
    </div>
    <script>
        window.onload = function() {
            const saved = JSON.parse(localStorage.getItem('classNotices')) || ["반갑습니다! 학생을 선택해 주세요."];
            saved.forEach(text => renderNotice(text));
        };
        function login() { if(document.getElementById('adminPw').value === "1234") { document.getElementById('login-zone').style.display = 'none'; document.getElementById('logout-zone').style.display = 'block'; document.getElementById('adminControls').style.display = 'block'; } }
        function logout() { location.reload(); }
        function addNotice() {
            const input = document.getElementById('noticeInput');
            if(!input.value) return;
            const notices = JSON.parse(localStorage.getItem('classNotices')) || [];
            notices.unshift(input.value);
            localStorage.setItem('classNotices', JSON.stringify(notices));
            renderNotice(input.value, true);
            input.value = "";
        }
        function renderNotice(text, isNew = false) {
            const li = document.createElement('li'); li.className = 'notice-item'; li.innerText = "📌 " + text;
            const list = document.getElementById('noticeList');
            if(isNew) list.prepend(li); else list.appendChild(li);
        }
        function clearNotices() { if(confirm("삭제하시겠습니까?")) { localStorage.removeItem('classNotices'); location.reload(); } }
    </script>
</body>
</html>
